<header class="topbar">
  <div class="brand-row">
    {{ $showBack := and (not .IsHome) (ne .Kind "section") }}
    <a
      href="{{ "" | relURL }}"
      class="header-back-btn{{ if $showBack }} is-visible{{ end }}"
      aria-label="Back to table"
      title="Back to table"
    >
      &#8592;
    </a>
    <h1 class="brand-title">
      <img class="brand-logo" src="https://httk.org/img/httk-logo-curves.svg" alt="httk logo" />
      <span>Spacegroup Data Explorer</span>
    </h1>
  </div>
  <div class="topbar-actions">
    <div class="theme-switch" role="group" aria-label="Theme">
      <button type="button" class="theme-btn" data-theme-option="dark" aria-label="Use dark theme" title="Dark mode">
        <img class="theme-icon" src="{{ "icons/Hicon_Pack_1/moon.svg" | relURL }}" alt="" aria-hidden="true" />
      </button>
      <button type="button" class="theme-btn" data-theme-option="twilight" aria-label="Use twilight theme" title="Twilight mode">
        <img class="theme-icon" src="{{ "icons/Hicon_Pack_1/sun-half.svg" | relURL }}" alt="" aria-hidden="true" />
      </button>
      <button type="button" class="theme-btn" data-theme-option="light" aria-label="Use light theme" title="Light mode">
        <img class="theme-icon" src="{{ "icons/Hicon_Pack_1/sun.svg" | relURL }}" alt="" aria-hidden="true" />
      </button>
    </div>
  </div>
</header>
